# !git-alias commands are defined in ~/.local/bin/git-alias

[alias]
	st = status

	rb = rebase
	rbm = "!git-alias rbm"
	# rebase on top of origin/branch
	rbb = "!git-alias rbb"
	rbc = rebase --continue
	ri = rebase -i
	# git rebase -i <merge-base>
	rib = "!git-alias rib"

	ft = fetch
	# fetch remote branch
	ftb = "!git-alias ftb"
	# fetch and rebase default branch, then update local default branch
	fr = "!git-alias fr"
	# fetch and rebase local default branch only
	frm = "!git-alias frm"
	# fetch and rebase, then export
	fre = "!git-alias fre"
	# fetch and rebase branch
	frb = "!git-alias frb"

	# reset hard: "g re 4", defaults to "0" if no arg is passed
	re = "!git-alias re"
	# reset hard to merge base
	reb = "!git-alias reb"
	# reset hard and clean: "g rec 4", defaults to "0" if no arg is passed
	rec = "!git-alias rec"
	# reset hard and clean to merge base
	recb = "!git-alias recb"
	# reset soft, defaults to "0" if no arg is passed
	res = "!git-alias res"
	# reset soft to merge base
	resb = "!git-alias resb"
	pop = stash pop

	cm = commit
	# commit rename
	cmr = commit --amend -m
	# commit all with a message, or pass commit flags directly
	ca = "!git-alias ca"
	# commit all rename
	car = commit --amend -am

	# switch branch
	sw = switch
	co = checkout
	swm = "!git-alias swm"
	# switch to rebased branch, done by cherry-picking changes on top of origin/default
	# git swrb branch-to-switch
	swrb = "!git-alias swrb"

	cp = cherry-pick
	cpc = cherry-pick --continue
	cpt = cherry-pick --strategy=recursive -X theirs
	# cherry-pick branch: "g cpb TEST"
	cpb = "!git-alias cpb"

	di = diff
	diq = diff --name-only
	# diff merge base
	dib = "!git-alias dib"
	# diff merge base with name-only
	dibq = "!git-alias dibq"
	# diff default branch
	dim = "!git-alias dim"
	# diff default branch with name-only
	dimq = "!git-alias dimq"


	p = push
	e = push --force-with-lease

	sh = show
	shq = show --name-only --pretty=""

	lg = log --oneline -12
	lg2 = log --oneline -30
	lg3 = log --oneline
	# log with date
	lgd = log --format='%cd %s'
	tree = log --oneline --decorate --graph

	rlg = reflog -12
	rlg2 = reflog -30
	rlg3 = reflog

	br = branch --sort=-committerdate
	# start new branch from the default branch
	brs = "!git-alias brs"
	# start new branch, moving commits from current branch: "g brsm new-branch"
	brsm = "!git-alias brsm"

	# copy changes to ns--test branch
	brt = "!git-alias brt"
	brt2 = "!git-alias brt2"
	brt3 = "!git-alias brt3"

	# git branch tmp - backup changes in tmp branch
	brtmp = "!git-alias brtmp"
	# git branch tmp swap - swap changes with tmp
	brtmps = "!git-alias brtmps"

	# delete branch: "g dr [branch-name=current-branch]"
	brd = "!git-alias brd"
	# delete branch quickly, without removing it from origin
	brdq = "!git-alias brdq"

	# git fix
	f = "!git-alias f"
	# git fix, but manually add files
	fm = "!git-alias fm"
	# git fix, but manually add files and append to previous commit
	fma = "!git-alias fma"
	# git fix, but append to previous commit
	fa = "!git-alias fa"
	# git fix amend, then export
	fae = "!git-alias fae"
